<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Life Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .main-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 20px;
        }

        .sidebar {
            width: 240px;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .15);
        }

        .feature-btn {
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .18);
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            transition: .3s;
            text-align: left;
        }

        .feature-btn:hover {
            transform: translateX(6px);
            background: #fff;
            color: #2575fc;
        }

        .feature-btn.active {
            background: #fff;
            color: #2575fc;
        }

        .container {
            flex: 1;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .18);
        }

        .calc-panel {
            display: none;
        }

        .calc-panel.active {
            display: block;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: 2px solid #2575fc;
            font-size: 16px;
            outline: none;
            transition: .25s;
        }

        input:focus, select:focus {
            border-color: #6a11cb;
        }

        .main-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            padding: 14px;
            margin-top: 8px;
            border-radius: 12px;
            background: #2575fc;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            transition: .3s;
        }

        .main-btn:hover {
            background: #1d5fe0;
        }

        #result {
            margin-top: 25px;
            border-radius: 15px;
            padding: 18px;
            background: #f7f9ff;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            display: none;
        }

        .extra-stats {
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            text-align: left;
            font-size: 15px;
            font-weight: normal;
            line-height: 1.8;
        }

        .success { color: #17a34a; }
        .warning { color: #d97706; }
        .error { color: #dc2626; }

        @media(max-width: 760px) {
            .main-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .feature-btn {
                width: 48%;
            }
        }

        @media(max-width: 500px) {
            .container {
                padding: 20px;
            }
            .sidebar {
                gap: 8px;
            }
            .feature-btn {
                width: 100%;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="main-wrapper">

    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">
        <button class="feature-btn active" data-target="age">🎂 Age Calculator</button>
        <button class="feature-btn" data-target="anniversary">💑 Anniversary Tracker</button>
        <button class="feature-btn" data-target="planet">🪐 Space Age</button>
        <button class="feature-btn" data-target="leap">📅 Leap Year</button>
        <button class="feature-btn" data-target="generation">🧬 Generation</button>
    </div>

    <!-- ================= CALC CONTAINER ================= -->
    <div class="container">

        <!-- ================= AGE CALCULATOR ================= -->
        <div class="calc-panel active" id="panel-age">
            <h1>🎂 Age Calculator</h1>
            <div class="input-group">
                <label>Select Date of Birth</label>
                <input type="date" id="dob">
            </div>
            <button class="main-btn" id="btn-age">Calculate Age</button>
        </div>

        <!-- ================= ANNIVERSARY ================= -->
        <div class="calc-panel" id="panel-anniversary">
            <h1>💑 Anniversary Tracker</h1>
            <div class="input-group">
                <label>Marriage / Event Date</label>
                <input type="date" id="mdate">
            </div>
            <button class="main-btn" id="btn-anniversary">Check Anniversary</button>
        </div>

        <!-- ================= SPACE AGE ================= -->
        <div class="calc-panel" id="panel-planet">
            <h1>🪐 Space Age Calculator</h1>
            <div class="input-group">
                <label>Your Birth Date</label>
                <input type="date" id="spacedob">
            </div>
            <div class="input-group">
                <label>Select Planet</label>
                <select id="planetOpt">
                    <option value="0.2408467">Mercury</option>
                    <option value="0.61519726">Venus</option>
                    <option value="1.8808158">Mars</option>
                    <option value="11.862615">Jupiter</option>
                    <option value="29.447498">Saturn</option>
                </select>
            </div>
            <button class="main-btn" id="btn-planet">Calculate Space Age</button>
        </div>

        <!-- ================= LEAP YEAR CHECKER ================= -->
        <div class="calc-panel" id="panel-leap">
            <h1>📅 Leap Year Checker</h1>
            <div class="input-group">
                <label>Enter Year</label>
                <input type="number" id="yearInput" placeholder="e.g. 2024" min="1">
            </div>
            <button class="main-btn" id="btn-leap">Check Leap Year</button>
        </div>

        <!-- ================= GENERATION FINDER ================= -->
        <div class="calc-panel" id="panel-generation">
            <h1>🧬 Generation Finder</h1>
            <div class="input-group">
                <label>Birth Year</label>
                <input type="number" id="genYear" placeholder="e.g. 2002" min="1900" max="2100">
            </div>
            <button class="main-btn" id="btn-generation">Find Generation</button>
        </div>

        <!-- ================= RESULT BOX ================= -->
        <div id="result"></div>

    </div>

</div>

<script>
// ================= COMMON VARIABLES =================
const result = document.getElementById("result");

function showResult(html){
    result.style.display = "block";
    result.innerHTML = html;
}

// Today's date limit
const today = new Date().toISOString().split("T")[0];
document.getElementById("dob").max = today;
document.getElementById("mdate").max = today;
document.getElementById("spacedob").max = today;

// ================= SIDEBAR NAVIGATION =================
const panels = document.querySelectorAll(".calc-panel");
const buttons = document.querySelectorAll(".feature-btn");

buttons.forEach(btn => {
    btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        panels.forEach(panel => panel.classList.remove("active"));
        document.getElementById("panel-" + btn.dataset.target).classList.add("active");

        result.style.display = "none";
        result.innerHTML = "";
    });
});

// ================= HELPER FUNCTIONS =================
function livedDays(date){
    return Math.floor((new Date() - date) / (1000 * 60 * 60 * 24));
}

function formatNumber(num){
    return Number(num).toLocaleString();
}

// ================= AGE CALCULATOR =================
document.getElementById("btn-age").addEventListener("click", function(){
    const dob = document.getElementById("dob").value;
    if(!dob){
        showResult("<span class='error'>Please select your date of birth.</span>");
        return;
    }

    const birth = new Date(dob);
    const now = new Date();
    if(birth > now){
        showResult("<span class='error'>Birth date cannot be in future.</span>");
        return;
    }

    let years = now.getFullYear() - birth.getFullYear();
    let months = now.getMonth() - birth.getMonth();
    let days = now.getDate() - birth.getDate();
    
    if (days < 0) {
        months--;
        const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += lastMonth.getDate();
    }
    if (months < 0) {
        years--;
        months += 12;
    }

    const totalDays = livedDays(birth);
    const weekDays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    let nextBirthday = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
    if (nextBirthday < now) {
        nextBirthday.setFullYear(now.getFullYear() + 1);
    }
    const leftDays = Math.ceil((nextBirthday - now) / (1000 * 60 * 60 * 24));

    showResult(`
        ${years} Years<br>
        ${months} Months<br>
        ${days} Days
        <div class="extra-stats">
            🎂 <b>Born On:</b> ${weekDays[birth.getDay()]}<br><br>
            ⏳ <b>Total Days:</b> ${formatNumber(totalDays)}<br><br>
            🎉 <b>Next Birthday:</b> ${leftDays <= 0 ? "Today 🎉" : leftDays + " Days Left"}
        </div>
    `);
});

// ================= ANNIVERSARY TRACKER =================
document.getElementById("btn-anniversary").addEventListener("click", function(){
    const value = document.getElementById("mdate").value;
    if(!value){
        showResult("<span class='error'>Please select anniversary date.</span>");
        return;
    }

    const start = new Date(value);
    const todayDate = new Date();
    if(start > todayDate){
        showResult("<span class='error'>Date cannot be in future.</span>");
        return;
    }

    let years = todayDate.getFullYear() - start.getFullYear();
    if(todayDate.getMonth() < start.getMonth() || (todayDate.getMonth() == start.getMonth() && todayDate.getDate() < start.getDate())){
        years--;
    }

    const total = livedDays(start);
    let nextAnniversary = new Date(todayDate.getFullYear(), start.getMonth(), start.getDate());
    if(nextAnniversary < todayDate){
        nextAnniversary.setFullYear(todayDate.getFullYear() + 1);
    }
    const remain = Math.ceil((nextAnniversary - todayDate) / (1000 * 60 * 60 * 24));

    showResult(`
        ❤️ ${years} Years Together
        <div class="extra-stats">
            💖 <b>Total Days Together:</b> ${formatNumber(total)}<br><br>
            🎊 <b>Next Anniversary:</b> ${remain <= 0 ? "Today 🎉" : remain + " Days Left"}<br><br>
            🏆 <b>Upcoming Milestone:</b> ${years + 1} Years
        </div>
    `);
});

// ================= SPACE AGE CALCULATOR =================
document.getElementById("btn-planet").addEventListener("click", function(){
    const dob = document.getElementById("spacedob").value;
    if(!dob){
        showResult("<span class='error'>Please select birth date.</span>");
        return;
    }

    const birth = new Date(dob);
    const earthAge = livedDays(birth) / 365.2425;
    const factor = parseFloat(document.getElementById("planetOpt").value);
    const planetName = document.getElementById("planetOpt").options[document.getElementById("planetOpt").selectedIndex].text;
    const spaceAge = (earthAge / factor).toFixed(2);

    showResult(`
        🪐 <b>${planetName}</b>
        <div class="extra-stats">
            🌍 <b>Earth Age:</b> ${earthAge.toFixed(2)} Years<br><br>
            🚀 <b>Your Age on ${planetName}:</b> ${spaceAge} Years
        </div>
    `);
});

// ================= LEAP YEAR CHECKER =================
document.getElementById("btn-leap").addEventListener("click", function(){
    const year = parseInt(document.getElementById("yearInput").value);
    if(isNaN(year)){
        showResult("<span class='error'>Please enter a valid year.</span>");
        return;
    }

    const leap = (year % 400 === 0) || (year % 4 === 0 && year % 100 !== 0);
    showResult(`
        📅 Year <b>${year}</b>
        <div class="extra-stats">
            ${leap ? "<span class='success'>✅ This is a Leap Year.</span>" : "<span class='warning'>❌ This is NOT a Leap Year.</span>"}
        </div>
    `);
});

// ================= GENERATION FINDER =================
document.getElementById("btn-generation").addEventListener("click", function(){
    const year = parseInt(document.getElementById("genYear").value);
    if(isNaN(year)){
        showResult("<span class='error'>Please enter birth year.</span>");
        return;
    }

    let generation = "";
    if(year >= 1901 && year <= 1927) generation = "Greatest Generation";
    else if(year >= 1928 && year <= 1945) generation = "Silent Generation";
    else if(year >= 1946 && year <= 1964) generation = "Baby Boomers";
    else if(year >= 1965 && year <= 1980) generation = "Generation X";
    else if(year >= 1981 && year <= 1996) generation = "Millennials";
    else if(year >= 1997 && year <= 2012) generation = "Generation Z";
    else if(year >= 2013) generation = "Generation Alpha";
    else generation = "Unknown";

    showResult(`
        🧬 <b>${generation}</b>
        <div class="extra-stats">
            📅 Birth Year: <b>${year}</b><br><br>
            👤 Generation: <b>${generation}</b>
        </div>
    `);
});

// ================= EXTRA UTILITIES =================
// Press Enter to calculate
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("keypress", function(e){
        if(e.key !== "Enter") return;
        const panel = this.closest(".calc-panel");

        if(panel.id === "panel-age") document.getElementById("btn-age").click();
        else if(panel.id === "panel-anniversary") document.getElementById("btn-anniversary").click();
        else if(panel.id === "panel-planet") document.getElementById("btn-planet").click();
        else if(panel.id === "panel-leap") document.getElementById("btn-leap").click();
        else if(panel.id === "panel-generation") document.getElementById("btn-generation").click();
    });
});

// Auto focus first input on panel change
buttons.forEach(btn => {
    btn.addEventListener("click", () => {
        setTimeout(() => {
            const panel = document.querySelector(".calc-panel.active");
            const firstInput = panel.querySelector("input,select");
            if(firstInput) firstInput.focus();
        }, 100);
    });
});

// Clear result when any input changes
document.querySelectorAll("input,select").forEach(el => {
    el.addEventListener("input", () => {
        result.style.display = "none";
        result.innerHTML = "";
    });
});

console.log("Ultimate Life Calculator Loaded Successfully 🚀");
</script>
</body>
</html>
